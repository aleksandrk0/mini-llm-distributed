name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU PyTorch
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch
      - name: Install package + dev tools (один источник — pyproject)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests (incl. DDP correctness on gloo/CPU)
        run: pytest
